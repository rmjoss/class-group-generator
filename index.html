<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Group Generator</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel Standalone for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Space Mono', monospace; 
            margin: 0;
            padding: 0;
        }
        * { 
            scrollbar-width: thin; 
            scrollbar-color: #fbbf24 transparent; 
        }
        *::-webkit-scrollbar { 
            width: 8px; 
        }
        *::-webkit-scrollbar-track { 
            background: transparent; 
        }
        *::-webkit-scrollbar-thumb { 
            background: #fbbf24; 
            border-radius: 4px; 
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // Storage hook with fallback
        const useStorage = () => {
          const getItem = async (key) => {
            try {
              if (window.storage) {
                const result = await window.storage.get(key);
                return result ? JSON.parse(result.value) : null;
              }
            } catch (e) {}
            return JSON.parse(localStorage.getItem(key) || 'null');
          };

          const setItem = async (key, value) => {
            try {
              if (window.storage) {
                await window.storage.set(key, JSON.stringify(value));
              }
            } catch (e) {}
            localStorage.setItem(key, JSON.stringify(value));
          };

          return { getItem, setItem };
        };

        // Class data management hook
        const useClassData = () => {
          const [classes, setClasses] = useState([]);
          const [currentClassId, setCurrentClassId] = useState(null);
          const [nextColorIndex, setNextColorIndex] = useState(0);
          const { getItem, setItem } = useStorage();

          useEffect(() => {
            getItem('classes').then(data => {
              if (data) {
                setClasses(data);
                if (data.length > 0) setCurrentClassId(data[0].id);
              }
            });
            getItem('nextColorIndex').then(data => {
              if (data !== null) setNextColorIndex(data);
            });
          }, []);

          useEffect(() => {
            if (classes.length > 0) setItem('classes', classes);
          }, [classes]);

          useEffect(() => {
            setItem('nextColorIndex', nextColorIndex);
          }, [nextColorIndex]);

          const addClass = (name) => {
            const darkColors = [
              '#000000', // black
              '#1e40af', // medium blue (more visible than the previous dark navy)
              '#7f1d1d', // dark red
              '#374151', // dark grey
              '#14532d', // dark green
            ];
            const newClass = { 
              id: Date.now(), 
              name, 
              students: [],
              color: darkColors[nextColorIndex % darkColors.length]
            };
            setClasses(prev => [...prev, newClass]);
            setCurrentClassId(newClass.id);
            setNextColorIndex(prev => prev + 1);
          };

          const deleteClass = (id) => {
            setClasses(prev => {
              const filtered = prev.filter(c => c.id !== id);
              if (currentClassId === id && filtered.length > 0) {
                setCurrentClassId(filtered[0].id);
              }
              return filtered;
            });
          };

          const addStudent = (name) => {
            setClasses(prev => prev.map(c => 
              c.id === currentClassId ? { ...c, students: [...c.students, { id: Date.now(), name }] } : c
            ));
          };

          const removeStudent = (studentId) => {
            setClasses(prev => prev.map(c => 
              c.id === currentClassId ? { ...c, students: c.students.filter(s => s.id !== studentId) } : c
            ));
          };

          const currentClass = classes.find(c => c.id === currentClassId);

          return { classes, currentClass, currentClassId, setCurrentClassId, addClass, deleteClass, addStudent, removeStudent };
        };

        // Group generation hook
        const useGroupGeneration = (students, history) => {
          const generateGroups = useCallback((groupSize) => {
            if (!students || students.length === 0) return [];
            
            const shuffled = [...students].sort(() => Math.random() - 0.5);
            const groups = [];
            for (let i = 0; i < shuffled.length; i += groupSize) {
              groups.push(shuffled.slice(i, i + groupSize));
            }
            return groups;
          }, [students]);

          const scoreFreshness = useCallback((groups) => {
            if (!history || history.length === 0) return 100;
            
            const recentHistory = history.slice(-5);
            let pairCounts = {};
            
            recentHistory.forEach(config => {
              config.groups.forEach(group => {
                for (let i = 0; i < group.length; i++) {
                  for (let j = i + 1; j < group.length; j++) {
                    const pair = [group[i].id, group[j].id].sort().join('-');
                    pairCounts[pair] = (pairCounts[pair] || 0) + 1;
                  }
                }
              });
            });

            let repeatedPairs = 0;
            let totalPairs = 0;

            groups.forEach(group => {
              for (let i = 0; i < group.length; i++) {
                for (let j = i + 1; j < group.length; j++) {
                  totalPairs++;
                  const pair = [group[i].id, group[j].id].sort().join('-');
                  if (pairCounts[pair]) repeatedPairs++;
                }
              }
            });

            return totalPairs === 0 ? 100 : Math.round(((totalPairs - repeatedPairs) / totalPairs) * 100);
          }, [history]);

          const smartGenerate = useCallback((groupSize) => {
            let bestGroups = generateGroups(groupSize);
            let bestScore = scoreFreshness(bestGroups);

            for (let i = 0; i < 49; i++) {
              const candidate = generateGroups(groupSize);
              const score = scoreFreshness(candidate);
              if (score > bestScore) {
                bestGroups = candidate;
                bestScore = score;
              }
            }

            return { groups: bestGroups, score: bestScore };
          }, [generateGroups, scoreFreshness]);

          return { smartGenerate, scoreFreshness };
        };

        // Drag and drop hook
        const useDragAndDrop = (groups, setGroups) => {
          const [draggedStudent, setDraggedStudent] = useState(null);
          const [draggedFrom, setDraggedFrom] = useState(null);

          const handleDragStart = (student, groupIndex) => {
            setDraggedStudent(student);
            setDraggedFrom(groupIndex);
          };

          const handleDrop = (targetGroupIndex) => {
            if (draggedStudent && draggedFrom !== null) {
              setGroups(prev => {
                const newGroups = prev.map(g => [...g]);
                newGroups[draggedFrom] = newGroups[draggedFrom].filter(s => s.id !== draggedStudent.id);
                newGroups[targetGroupIndex].push(draggedStudent);
                return newGroups;
              });
              setDraggedStudent(null);
              setDraggedFrom(null);
            }
          };

          return { handleDragStart, handleDrop, draggedStudent };
        };

        // Components
        const ClassAndStudentManager = ({ classes, currentClassId, setCurrentClassId, addClass, deleteClass, students, addStudent, removeStudent }) => {
          const [newClassName, setNewClassName] = useState('');
          const [newStudent, setNewStudent] = useState('');
          const [isStudentsExpanded, setIsStudentsExpanded] = useState(false);

          const lightenColor = (hex, percent) => {
            const num = parseInt(hex.replace('#', ''), 16);
            const r = Math.min(255, Math.floor((num >> 16) + ((255 - (num >> 16)) * percent)));
            const g = Math.min(255, Math.floor(((num >> 8) & 0x00FF) + ((255 - ((num >> 8) & 0x00FF)) * percent)));
            const b = Math.min(255, Math.floor((num & 0x0000FF) + ((255 - (num & 0x0000FF)) * percent)));
            return `#${((r << 16) | (g << 8) | b).toString(16).padStart(6, '0')}`;
          };

          const darkenColor = (hex, percent) => {
            const num = parseInt(hex.replace('#', ''), 16);
            const r = Math.floor((num >> 16) * (1 - percent));
            const g = Math.floor(((num >> 8) & 0x00FF) * (1 - percent));
            const b = Math.floor((num & 0x0000FF) * (1 - percent));
            return `#${((r << 16) | (g << 8) | b).toString(16).padStart(6, '0')}`;
          };

          return (
            <div className="flex gap-4">
              {/* Classes - Left 1/3 */}
              <div className="w-1/3 space-y-3">
                <h2 className="text-2xl font-bold text-amber-400">Classes</h2>
                <div className="flex gap-2">
                  <input
                    value={newClassName}
                    onChange={(e) => setNewClassName(e.target.value)}
                    onKeyPress={(e) => e.key === 'Enter' && newClassName && (addClass(newClassName), setNewClassName(''))}
                    placeholder="New class..."
                    className="flex-1 px-3 py-2 bg-white/5 border border-amber-400/30 rounded-lg focus:outline-none focus:border-amber-400 text-sm"
                  />
                  <button
                    onClick={() => newClassName && (addClass(newClassName), setNewClassName(''))}
                    className="px-3 py-2 bg-amber-500 hover:bg-amber-600 rounded-lg font-bold transition-colors text-lg"
                    title="Add class"
                  >
                    +
                  </button>
                </div>
                <div className="space-y-2">
                  {classes.map(cls => {
                    const isSelected = currentClassId === cls.id;
                    const lightColor = cls.color ? lightenColor(cls.color, 0.3) : '#333333';
                    const darkColor = cls.color ? darkenColor(cls.color, 0.2) : '#000000';
                    return (
                      <div key={cls.id} className="flex items-center justify-between rounded-lg overflow-hidden">
                        <button
                          onClick={() => setCurrentClassId(cls.id)}
                          className={`flex-1 px-4 py-2 text-left transition-all ${isSelected ? '' : 'hover:opacity-80'}`}
                          style={isSelected ? {
                            background: `linear-gradient(135deg, ${lightColor} 0%, ${darkColor} 100%)`,
                            color: 'white'
                          } : {
                            background: 'rgba(255, 255, 255, 0.1)'
                          }}
                        >
                          {cls.name}
                        </button>
                        <button
                          onClick={() => deleteClass(cls.id)}
                          className="px-3 py-2 hover:bg-red-500/50 transition-colors"
                          style={isSelected ? { background: darkColor } : {}}
                        >
                          ×
                        </button>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Students - Right 2/3 */}
              <div className="w-2/3 space-y-3">
                <button
                  onClick={() => setIsStudentsExpanded(!isStudentsExpanded)}
                  className="w-full flex items-center justify-between text-left"
                >
                  <span className="text-2xl font-bold text-amber-400">Students ({students?.length || 0})</span>
                  <span className="text-2xl text-amber-400">{isStudentsExpanded ? '−' : '+'}</span>
                </button>
                {isStudentsExpanded && (
                  <>
                    <div className="flex gap-2">
                      <input
                        value={newStudent}
                        onChange={(e) => setNewStudent(e.target.value)}
                        onKeyPress={(e) => e.key === 'Enter' && newStudent && (addStudent(newStudent), setNewStudent(''))}
                        placeholder="Student name..."
                        className="flex-1 px-3 py-2 bg-white/5 border border-amber-400/30 rounded-lg focus:outline-none focus:border-amber-400 text-sm"
                      />
                      <button
                        onClick={() => newStudent && (addStudent(newStudent), setNewStudent(''))}
                        className="px-3 py-2 bg-amber-500 hover:bg-amber-600 rounded-lg font-bold transition-colors text-lg"
                        title="Add student"
                      >
                        +
                      </button>
                    </div>
                    <div className="flex gap-2 flex-wrap max-h-48 overflow-y-auto">
                      {students?.map(student => (
                        <div key={student.id} className="flex items-center gap-2 px-3 py-1 bg-white/10 rounded-lg h-fit">
                          <span>{student.name}</span>
                          <button onClick={() => removeStudent(student.id)} className="text-red-400 hover:text-red-300">×</button>
                        </div>
                      ))}
                    </div>
                  </>
                )}
              </div>
            </div>
          );
        };

        const GroupControls = ({ onGenerate, groupSize, setGroupSize, studentCount }) => (
          <div className="flex items-center gap-4">
            <label className="flex items-center gap-2">
              <span className="font-semibold">Group Size:</span>
              <input
                type="number"
                min="2"
                max={studentCount}
                value={groupSize}
                onChange={(e) => setGroupSize(parseInt(e.target.value))}
                className="w-20 px-3 py-2 bg-white/5 border border-amber-400/30 rounded-lg focus:outline-none focus:border-amber-400"
              />
            </label>
            <button
              onClick={onGenerate}
              disabled={studentCount < 2}
              className="px-6 py-2 rounded-lg font-bold transition-all shadow-lg hover:shadow-xl active:shadow-inner active:translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed"
              style={{
                background: 'linear-gradient(180deg, #fbbf24 0%, #f59e0b 50%, #d97706 100%)',
                boxShadow: '0 4px 6px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2)'
              }}
            >
              Generate Groups
            </button>
          </div>
        );

        const GroupDisplay = ({ groups, handleDragStart, handleDrop, score, onSave, onCopyImage, classes, currentClassId }) => {
          const canvasRef = useRef(null);

          const copyAsImage = () => {
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d');
            const scale = 3;
            const fontSize = 24 * scale;
            const padding = 40 * scale;
            const lineHeight = fontSize * 1.4;
            const groupSpacing = 50 * scale;
            const columnGap = 60 * scale;
            const buttonPadding = 12 * scale;
            const buttonRadius = 8 * scale;

            // Get current class info
            const currentClass = classes.find(c => c.id === currentClassId);
            const currentClassColor = currentClass?.color || '#000000';
            const currentClassName = currentClass?.name || 'Class';

            // Color palette for group buttons (bright colors for contrast on dark backgrounds)
            const groupColors = [
              '#ef4444', // red
              '#f59e0b', // amber
              '#10b981', // green
              '#3b82f6', // blue
              '#8b5cf6', // purple
              '#ec4899', // pink
              '#06b6d4', // cyan
              '#f97316', // orange
              '#14b8a6', // teal
              '#a855f7', // violet
              '#84cc16', // lime
              '#f43f5e', // rose
            ];

            // Calculate grid dimensions (as square as possible)
            const numGroups = groups.length;
            const cols = Math.ceil(Math.sqrt(numGroups));
            const rows = Math.ceil(numGroups / cols);

            ctx.font = `${fontSize}px Palatino, 'Palatino Linotype', serif`;
            
            // Calculate dimensions for each group
            let maxGroupWidth = 0;
            let maxGroupHeight = 0;
            
            groups.forEach((group, i) => {
              const header = `Group ${i + 1}`;
              let groupWidth = ctx.measureText(header).width + buttonPadding * 2;
              let groupHeight = lineHeight + buttonPadding * 2; // header button
              
              group.forEach(s => {
                groupWidth = Math.max(groupWidth, ctx.measureText(`  • ${s.name}`).width);
                groupHeight += lineHeight;
              });
              
              maxGroupWidth = Math.max(maxGroupWidth, groupWidth);
              maxGroupHeight = Math.max(maxGroupHeight, groupHeight);
            });

            // Calculate canvas dimensions (adding extra space for class name at top)
            const classNameHeight = fontSize * 2;
            canvas.width = cols * maxGroupWidth + (cols - 1) * columnGap + padding * 2;
            canvas.height = rows * maxGroupHeight + (rows - 1) * groupSpacing + padding * 2 + classNameHeight;
            
            // Helper functions for color manipulation
            const lightenColor = (hex, percent) => {
              const num = parseInt(hex.replace('#', ''), 16);
              const r = Math.min(255, Math.floor((num >> 16) + ((255 - (num >> 16)) * percent)));
              const g = Math.min(255, Math.floor(((num >> 8) & 0x00FF) + ((255 - ((num >> 8) & 0x00FF)) * percent)));
              const b = Math.min(255, Math.floor((num & 0x0000FF) + ((255 - (num & 0x0000FF)) * percent)));
              return `#${((r << 16) | (g << 8) | b).toString(16).padStart(6, '0')}`;
            };
            
            const darkenColor = (hex, percent) => {
              const num = parseInt(hex.replace('#', ''), 16);
              const r = Math.floor((num >> 16) * (1 - percent));
              const g = Math.floor(((num >> 8) & 0x00FF) * (1 - percent));
              const b = Math.floor((num & 0x0000FF) * (1 - percent));
              return `#${((r << 16) | (g << 8) | b).toString(16).padStart(6, '0')}`;
            };
            
            // Create gradient background (darker at bottom, lighter at top)
            const bgGradient = ctx.createLinearGradient(0, canvas.height, 0, 0);
            bgGradient.addColorStop(0, darkenColor(currentClassColor, 0.2)); // darker at bottom
            bgGradient.addColorStop(1, lightenColor(currentClassColor, 0.3)); // lighter at top
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw class name at top left (bold and underlined)
            ctx.font = `bold ${fontSize * 1.2}px Palatino, 'Palatino Linotype', serif`;
            ctx.fillStyle = '#ffffff';
            const classNameY = padding + fontSize * 1.2;
            ctx.fillText(currentClassName, padding, classNameY);
            
            // Draw underline for class name
            const classNameWidth = ctx.measureText(currentClassName).width;
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 3 * scale;
            ctx.beginPath();
            ctx.moveTo(padding, classNameY + fontSize * 0.15);
            ctx.lineTo(padding + classNameWidth, classNameY + fontSize * 0.15);
            ctx.stroke();

            // Adjust starting Y position for groups to account for class name
            const groupStartY = classNameY + fontSize * 0.8;

            // Draw groups in grid
            groups.forEach((group, i) => {
              const col = i % cols;
              const row = Math.floor(i / cols);
              const x = padding + col * (maxGroupWidth + columnGap);
              const y = groupStartY + row * (maxGroupHeight + groupSpacing);

              const headerText = `Group ${i + 1}`;
              ctx.font = `bold ${fontSize}px Palatino, 'Palatino Linotype', serif`;
              const textWidth = ctx.measureText(headerText).width;
              
              // Draw button background for group header with subtle gradient
              const buttonWidth = textWidth + buttonPadding * 2;
              const buttonHeight = fontSize + buttonPadding * 2;
              
              const buttonColor = groupColors[i % groupColors.length];
              const buttonGradient = ctx.createLinearGradient(x, y, x, y + buttonHeight);
              buttonGradient.addColorStop(0, lightenColor(buttonColor, 0.15)); // slightly lighter at top
              buttonGradient.addColorStop(1, darkenColor(buttonColor, 0.15)); // slightly darker at bottom
              
              ctx.fillStyle = buttonGradient;
              ctx.beginPath();
              ctx.roundRect(x, y, buttonWidth, buttonHeight, buttonRadius);
              ctx.fill();
              
              // Draw group header text
              ctx.fillStyle = '#ffffff';
              ctx.fillText(headerText, x + buttonPadding, y + buttonPadding + fontSize);
              
              // Draw student names
              ctx.font = `${fontSize}px Palatino, 'Palatino Linotype', serif`;
              ctx.fillStyle = '#ffffff';
              
              group.forEach((s, idx) => {
                ctx.fillText(`  • ${s.name}`, x, y + buttonHeight + lineHeight * (idx + 1));
              });
            });

            canvas.toBlob(blob => navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]));
            onCopyImage();
          };

          return (
            <div className="space-y-4">
              <div className="flex items-center justify-between">
                <div className="text-lg font-bold">
                  Freshness: <span className="text-amber-400">{score}%</span>
                </div>
                <div className="flex gap-2">
                  <button 
                    onClick={copyAsImage} 
                    className="px-4 py-2 rounded-lg font-semibold transition-all shadow-lg hover:shadow-xl active:shadow-inner active:translate-y-0.5"
                    style={{
                      background: 'linear-gradient(180deg, #3b82f6 0%, #1e40af 100%)',
                      boxShadow: '0 4px 6px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2)'
                    }}
                  >
                    Copy Image
                  </button>
                  <button 
                    onClick={onSave} 
                    className="px-4 py-2 rounded-lg font-semibold transition-all shadow-lg hover:shadow-xl active:shadow-inner active:translate-y-0.5"
                    style={{
                      background: 'linear-gradient(180deg, #10b981 0%, #047857 100%)',
                      boxShadow: '0 4px 6px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2)'
                    }}
                  >
                    Save Config
                  </button>
                </div>
              </div>
              <div 
                className="grid gap-4"
                style={{
                  gridTemplateColumns: `repeat(${Math.ceil(Math.sqrt(groups.length))}, minmax(0, 1fr))`
                }}
              >
                {groups.map((group, idx) => (
                  <div
                    key={idx}
                    onDragOver={(e) => e.preventDefault()}
                    onDrop={() => handleDrop(idx)}
                    className="bg-gradient-to-br from-white/10 to-white/5 rounded-xl p-4 border border-amber-400/20"
                  >
                    <h3 className="font-bold text-lg mb-3 text-amber-400">Group {idx + 1}</h3>
                    {group.map(student => (
                      <div
                        key={student.id}
                        draggable
                        onDragStart={() => handleDragStart(student, idx)}
                        className="px-3 py-2 mb-2 bg-white/10 rounded-lg cursor-move hover:bg-white/20 transition-colors"
                      >
                        {student.name}
                      </div>
                    ))}
                  </div>
                ))}
              </div>
              <canvas ref={canvasRef} style={{ display: 'none' }} />
            </div>
          );
        };

        const HistoryPanel = ({ history, onLoad }) => (
          <div className="space-y-2 max-h-96 overflow-y-auto">
            <h3 className="text-xl font-bold text-amber-400">History</h3>
            {history?.slice().reverse().map((config, idx) => (
              <div key={idx} className="p-3 bg-white/5 rounded-lg hover:bg-white/10 transition-colors">
                <div className="flex justify-between items-center">
                  <div>
                    <div className="font-semibold">{new Date(config.timestamp).toLocaleString()}</div>
                    <div className="text-sm opacity-70">{config.groups.length} groups • Freshness: {config.score}%</div>
                  </div>
                  <button
                    onClick={() => onLoad(config)}
                    className="px-4 py-1 bg-amber-500 hover:bg-amber-600 rounded transition-colors"
                  >
                    Load
                  </button>
                </div>
              </div>
            ))}
          </div>
        );

        // Main App
        function ClassGroupGenerator() {
          const [darkMode, setDarkMode] = useState(true);
          const [groupSize, setGroupSize] = useState(3);
          const [groups, setGroups] = useState([]);
          const [score, setScore] = useState(100);
          const [history, setHistory] = useState([]);
          const [showHistory, setShowHistory] = useState(false);
          const [notification, setNotification] = useState('');

          const { classes, currentClass, currentClassId, setCurrentClassId, addClass, deleteClass, addStudent, removeStudent } = useClassData();
          const { smartGenerate, scoreFreshness } = useGroupGeneration(currentClass?.students, history);
          const { handleDragStart, handleDrop } = useDragAndDrop(groups, setGroups);
          const { getItem, setItem } = useStorage();

          useEffect(() => {
            if (currentClassId) {
              getItem(`history-${currentClassId}`).then(data => data && setHistory(data));
            }
          }, [currentClassId]);

          useEffect(() => {
            if (currentClassId && history.length > 0) {
              setItem(`history-${currentClassId}`, history);
            }
          }, [history, currentClassId]);

          const generate = () => {
            const result = smartGenerate(groupSize);
            setGroups(result.groups);
            setScore(result.score);
          };

          const saveConfig = () => {
            const config = { timestamp: Date.now(), groups, score };
            setHistory(prev => [...prev, config]);
            showNotification('Configuration saved!');
          };

          const loadConfig = (config) => {
            setGroups(config.groups);
            setScore(config.score);
            setShowHistory(false);
          };

          const showNotification = (msg) => {
            setNotification(msg);
            setTimeout(() => setNotification(''), 2000);
          };

          return (
            <div className={`min-h-screen ${darkMode ? 'bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-white' : 'bg-gradient-to-br from-amber-50 via-orange-50 to-amber-100 text-slate-900'} transition-colors duration-300`}>
              <div className="container mx-auto px-4 py-8 max-w-7xl">
                <div className="flex justify-between items-center mb-8">
                  <h1 className="text-4xl font-bold bg-gradient-to-r from-amber-400 to-orange-500 bg-clip-text text-transparent">
                    Class Group Generator
                  </h1>
                  <div className="flex gap-3">
                    <button
                      onClick={() => setShowHistory(!showHistory)}
                      className="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-lg transition-colors"
                    >
                      {showHistory ? 'Hide' : 'Show'} History
                    </button>
                    <button
                      onClick={() => setDarkMode(!darkMode)}
                      className="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-lg transition-colors"
                    >
                      {darkMode ? '☀️' : '🌙'}
                    </button>
                  </div>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                  <div className="lg:col-span-2 space-y-6">
                    <div className="bg-white/10 backdrop-blur-sm rounded-2xl p-6 border border-amber-400/20">
                      <ClassAndStudentManager
                        classes={classes}
                        currentClassId={currentClassId}
                        setCurrentClassId={setCurrentClassId}
                        addClass={addClass}
                        deleteClass={deleteClass}
                        students={currentClass?.students}
                        addStudent={addStudent}
                        removeStudent={removeStudent}
                      />
                    </div>

                    {currentClass && (
                      <>
                        <div className="bg-white/10 backdrop-blur-sm rounded-2xl p-6 border border-amber-400/20">
                          <GroupControls
                            onGenerate={generate}
                            groupSize={groupSize}
                            setGroupSize={setGroupSize}
                            studentCount={currentClass.students.length}
                          />
                        </div>

                        {groups.length > 0 && (
                          <div className="bg-white/10 backdrop-blur-sm rounded-2xl p-6 border border-amber-400/20">
                            <h2 className="text-2xl font-bold mb-4 text-amber-400">Current Groups</h2>
                            <GroupDisplay
                              groups={groups}
                              handleDragStart={handleDragStart}
                              handleDrop={handleDrop}
                              score={score}
                              onSave={saveConfig}
                              onCopyImage={() => showNotification('Copied as image!')}
                              classes={classes}
                              currentClassId={currentClassId}
                            />
                          </div>
                        )}
                      </>
                    )}
                  </div>

                  {showHistory && (
                    <div className="bg-white/10 backdrop-blur-sm rounded-2xl p-6 border border-amber-400/20">
                      <HistoryPanel history={history} onLoad={loadConfig} />
                    </div>
                  )}
                </div>

                {notification && (
                  <div className="fixed bottom-6 right-6 px-6 py-3 bg-green-600 rounded-lg shadow-2xl animate-pulse">
                    {notification}
                  </div>
                )}
              </div>
            </div>
          );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ClassGroupGenerator />);
    </script>
</body>
</html>
